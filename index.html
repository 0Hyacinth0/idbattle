<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>id大作战</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="version-badge">v1.1.0-b1(Prism)</div>
        <h1>id大作战</h1>

        <div class="player-form" role="form" aria-label="玩家创建表单">
            <div class="player-input">
                <label for="player1">玩家1:</label>
                <input type="text" id="player1" placeholder="输入玩家1名称" autocomplete="off">
            </div>
            <div class="player-input">
                <label for="player2">玩家2:</label>
                <input type="text" id="player2" placeholder="输入玩家2名称" autocomplete="off">
            </div>
            <button id="battle-btn" type="button">开始对决！</button>
            <p id="form-error" class="form-error" role="alert" aria-live="assertive"></p>
        </div>

        <div class="battle-area">
            <div class="player-info player1-info" aria-live="polite">
                <div class="player-card">
                    <div class="player-card__header">
                        <h2>玩家1信息</h2>
                        <div class="player-card__summary">
                            <div class="summary-block summary-block--name">
                                <span class="summary-label">名称</span>
                                <span class="summary-value" id="p1-name">-</span>
                                <div class="summary-health">
                                    <div class="health-meter" id="p1-health-bar" role="progressbar" aria-valuemin="0" aria-valuenow="0" aria-valuemax="0" aria-label="玩家1生命值" aria-live="polite">
                                        <div class="health-meter__track">
                                            <div class="health-meter__fill"></div>
                                        </div>
                                        <span class="health-meter__value" id="p1-health-bar-value">--</span>
                                    </div>
                                </div>
                            </div>
                            <div class="summary-block">
                                <span class="summary-label">技能</span>
                                <span class="summary-value" id="p1-skill">-</span>
                            </div>
                        </div>
                    </div>
                    <div class="player-card__stats-grid" role="list">
                        <div class="stat-tile" role="listitem">
                            <span class="stat-label">攻击</span>
                            <span class="stat-value" id="p1-attack">-</span>
                        </div>
                        <div class="stat-tile" role="listitem">
                            <span class="stat-label">防御</span>
                            <span class="stat-value" id="p1-defense">-</span>
                        </div>
                        <div class="stat-tile" role="listitem">
                            <span class="stat-label" data-speed-label="p1">加速</span>
                            <span class="stat-value" id="p1-speed">-</span>
                        </div>
                    </div>
                    <div class="player-card__detail-grid">
                        <div class="detail-section">
                            <h3>装备</h3>
                            <div id="p1-equipment" class="detail-list" aria-live="polite"></div>
                        </div>
                        <div class="detail-section">
                            <h3>状态</h3>
                            <div id="p1-status" class="detail-list" aria-live="polite"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="battle-result">
                <h2>战斗日志</h2>
                <div id="result-log" role="log" aria-live="polite"></div>
            </div>

            <div class="player-info player2-info" aria-live="polite">
                <div class="player-card">
                    <div class="player-card__header">
                        <h2>玩家2信息</h2>
                        <div class="player-card__summary">
                            <div class="summary-block summary-block--name">
                                <span class="summary-label">名称</span>
                                <span class="summary-value" id="p2-name">-</span>
                                <div class="summary-health">
                                    <div class="health-meter" id="p2-health-bar" role="progressbar" aria-valuemin="0" aria-valuenow="0" aria-valuemax="0" aria-label="玩家2生命值" aria-live="polite">
                                        <div class="health-meter__track">
                                            <div class="health-meter__fill"></div>
                                        </div>
                                        <span class="health-meter__value" id="p2-health-bar-value">--</span>
                                    </div>
                                </div>
                            </div>
                            <div class="summary-block">
                                <span class="summary-label">技能</span>
                                <span class="summary-value" id="p2-skill">-</span>
                            </div>
                        </div>
                    </div>
                    <div class="player-card__stats-grid" role="list">
                        <div class="stat-tile" role="listitem">
                            <span class="stat-label">攻击</span>
                            <span class="stat-value" id="p2-attack">-</span>
                        </div>
                        <div class="stat-tile" role="listitem">
                            <span class="stat-label">防御</span>
                            <span class="stat-value" id="p2-defense">-</span>
                        </div>
                        <div class="stat-tile" role="listitem">
                            <span class="stat-label" data-speed-label="p2">加速</span>
                            <span class="stat-value" id="p2-speed">-</span>
                        </div>
                    </div>
                    <div class="player-card__detail-grid">
                        <div class="detail-section">
                            <h3>装备</h3>
                            <div id="p2-equipment" class="detail-list" aria-live="polite"></div>
                        </div>
                        <div class="detail-section">
                            <h3>状态</h3>
                            <div id="p2-status" class="detail-list" aria-live="polite"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
